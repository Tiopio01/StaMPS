name: CI

on:
  push:
    branches: ['windows-port/**']
  pull_request:
    branches: ['windows-port/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install deps
        # Plan tech-stack mandates GCC 13 on Ubuntu — install explicitly;
        # ubuntu-latest's default gcc may lag. CC/CXX are exported below
        # so CMake picks up gcc-13 rather than the distro default.
        run: sudo apt-get update && sudo apt-get install -y cmake tcsh gawk gcc-13 g++-13
      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: CTest smoke
        run: ctest --test-dir build --output-on-failure
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.11" }
      - name: pytest (with test extras)
        # -m "not nightly" excludes @pytest.mark.nightly tests (e.g. e2e)
        # which run on nightly-e2e.yml's cron. Keeps PR latency bounded.
        run: pip install .[test] && python -m pytest tests/ -v -m "not nightly"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: brew install cmake
      - run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --config Release
      - run: ctest --test-dir build --output-on-failure
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.11" }
      - run: pip install .[test] && python -m pytest tests/ -v -m "not nightly"

  build-windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Configure (MSVC)
        run: cmake -S src -B build -G "Visual Studio 17 2022" -A x64
      - name: Build
        run: cmake --build build --config Release
      - name: CTest smoke
        run: ctest --test-dir build -C Release --output-on-failure
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.11" }
      - run: pip install .[test] && python -m pytest tests/ -v -m "not nightly"

  build-windows-mingw:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2.31.1
        with:
          msystem: MINGW64
          update: true
          # mingw-w64-x86_64-python-pip is a SEPARATE package from
          # mingw-w64-x86_64-python — without it, `python -m pip` fails
          # with "No module named pip". Install explicitly.
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-make
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
      - name: Configure + build (MinGW)
        shell: msys2 {0}
        run: |
          cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: pytest (incl. byte-identity goldens on MinGW)
        shell: msys2 {0}
        run: |
          # MinGW pytest verifies Linux-MinGW byte parity per spec §11 AC#3.
          # -m "not nightly" excludes slow e2e tests; those run in nightly-e2e.yml.
          python -m pip install --upgrade pip
          python -m pip install .[test]
          python -m pytest tests/ -v -m "not nightly"

  # Italian-locale CI (validates spec's locale-invariance goal end-to-end,
  # not just unit tests).
  ci-italian-locale:
    runs-on: windows-latest
    continue-on-error: true   # best-effort; fails on runner locale-switch limitations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set Italian locale
        shell: pwsh
        run: |
          Set-WinSystemLocale it-IT
          [System.Threading.Thread]::CurrentThread.CurrentCulture = 'it-IT'
      - run: cmake -S src -B build -G "Visual Studio 17 2022" -A x64
      - run: cmake --build build --config Release
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.11" }
      - run: pip install .[test]
      - name: Run locale-sensitive subset under it-IT
        env:
          LC_ALL: it_IT.UTF-8
          LC_NUMERIC: it_IT.UTF-8
        run: python -m pytest tests/test_locale_pinning.py tests/test_par_parser.py -v

  # Canary: minimal-deps Ubuntu (catches undocumented deps).
  canary-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install only documented prereqs
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
      - run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build
      # Use setup-python instead of system python3 to avoid PEP 668
      # externally-managed-environment friction. Real users on Ubuntu
      # would hit the same issue and would use pyenv/venv/conda; CI
      # reflects a plausible setup rather than fighting the distro.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.11" }
      - run: pip install .[test]
      # -m "not nightly" keeps slow e2e out of PR path; nightly-e2e.yml runs those.
      - run: python -m pytest tests/ -v -k "not requires_matlab and not requires_tcsh" -m "not nightly"

  # Pre-commit enforcement: contributors who skip `pre-commit install`
  # are still gated by CI. Catches ruff/mypy/pre-commit-hook violations
  # that would otherwise reach main. Mirrors local hook config.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.11" }
      - name: Install pre-commit
        run: pip install pre-commit==3.8.0
      - name: Run all hooks
        run: pre-commit run --all-files --show-diff-on-failure

  linux-csh-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: sudo apt-get update && sudo apt-get install -y tcsh gawk cmake build-essential
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.11" }
      - name: Re-capture csh outputs + diff against committed goldens
        run: |
          # capture.sh builds the C++ binaries + generates fixtures itself.
          # --verify-only regenerates the golden tree into tmp and diffs against
          # the committed tests/golden/linux_csh/. A mismatch signals either
          # non-determinism in the csh pipeline or an unintended change in
          # one of the C++ binaries.
          bash tests/golden/capture.sh --verify-only
      - name: Python port byte-identity against csh golden
        run: |
          pip install .[test]
          python -m pytest tests/test_golden_byte_identity.py -v

  # VS 2026 forward-compat probe. GitHub Actions is expected to transition
  # windows-latest to VS 2026 around May 2026. Until the generator ships on
  # runners, the configure step no-ops with a notice — the job passes without
  # running tests so CI stays green. Once VS 2026 runners roll out, the
  # `cmake --list-generators | grep "Visual Studio 18 2026"` check succeeds
  # and the real configure runs.
  build-windows-vs2026:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Configure + Build (MSVC v144, if VS 2026 generator available)
        shell: bash
        run: |
          if cmake --help | grep -q "Visual Studio 18 2026"; then
            cmake -S src -B build -G "Visual Studio 18 2026" -A x64
            cmake --build build --config Release
          else
            echo "::notice::VS 2026 generator not yet available on windows-latest; skipping until runner migration (~May 2026)."
            exit 0
          fi

  wheel-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.11" }
      - run: pip install build==1.2.2
      - run: python -m build --sdist --wheel --outdir dist/
      - name: Verify wheel imports cleanly
        run: |
          pip install dist/*.whl
          python -c "import stamps; print(stamps.__file__)"

  matlab-tests:
    runs-on: ${{ matrix.os }}
    # 60-min safety net: well under GHA's 4-hour default (360), guards
    # against hung MATLAB processes leaving jobs consuming minutes.
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        matlab-release: [R2023a, R2024a]
    continue-on-error: true  # skip-on-fork safe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - id: lic
        shell: bash
        run: |
          if [ -z "${{ secrets.MLM_LICENSE_FILE_CONTENTS }}" ]; then
            echo "has_license=false" >> $GITHUB_OUTPUT
          else
            echo "has_license=true" >> $GITHUB_OUTPUT
          fi
      - if: steps.lic.outputs.has_license == 'true'
        uses: matlab-actions/setup-matlab@a0180c939fb1a28de13f44f7b778b912384ced1f  # v3.0.1
        with:
          release: ${{ matrix.matlab-release }}
      - if: steps.lic.outputs.has_license == 'true'
        # run-command@v3 invokes MATLAB with -batch under the hood, but the
        # default `runtests(...)` call returns without signalling failure.
        # Capturing `results` and calling `exit(any([results.Failed]))`
        # propagates a nonzero exit when any test fails, so the job turns
        # red instead of green-with-silent-failures.
        uses: matlab-actions/run-command@00a6560bdaa6b55c93fff755fb869911be1a9aab  # v3.0.1
        with:
          command: "addpath('matlab_compat'); results = runtests('tests/matlab','IncludeSubfolders',true); exit(any([results.Failed]))"
      - if: steps.lic.outputs.has_license == 'false'
        run: echo "::warning::Skipping MATLAB tests — no license secret configured"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        # Skip legacy upstream Python 2 scripts under bin/ (tsx_dump_heading,
        # etc.) that pre-date the Windows port and aren't in scope for lint.
        args: [--fix, "--extend-exclude=bin/"]
      - id: ruff-format
        args: ["--extend-exclude=bin/"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^python/stamps/
        additional_dependencies: []

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^(.*\.bat|.*\.cmd)$   # batch files need CRLF
